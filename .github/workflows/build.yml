name: Build cotton-filter

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "fastapi[standard]" pandas openpyxl xlrd "uvicorn[standard]" pyinstaller pytest
          npm ci

      - name: Validate
        run: |
          python -m compileall backend cotton_filter_app
          python -c "import fastapi, pandas, openpyxl, xlrd, uvicorn"
          python -m pytest

      - name: Write build metadata
        env:
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          python -m cotton_filter_app.write_build_info

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            npm run build
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is not configured; building unsigned installers without updater artifacts."
            npm run tauri -- build --config '{"bundle":{"createUpdaterArtifacts":false}}'
          fi

      - name: Write updater manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            npm run manifest:updater
          else
            echo "Skip updater manifest because TAURI_SIGNING_PRIVATE_KEY is not configured."
          fi

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "cotton-filter ${{ github.ref_name }}"
          body: "Built automatically from ${{ github.ref_name }} with Tauri."
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.sig
            dist/updater/*.json
          prerelease: false
