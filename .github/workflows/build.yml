name: Build cotton-filter

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl xlrd pillow pystray pyinstaller pytest

      - name: Validate
        run: |
          python -m compileall main.py cotton_filter_app
          python -c "import tkinter, pandas, openpyxl, xlrd, pystray, PIL"
          python -m pytest

      - name: Write build metadata
        env:
          BUILD_COMMIT: ${{ github.sha }}
        run: |
          python -m cotton_filter_app.write_build_info

      - name: Build Windows app
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name cotton-filter --clean main.py

      - name: Publish Windows release asset
        if: runner.os == 'Windows' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "cotton-filter latest"
          body: "Built automatically from commit ${{ github.sha }}."
          files: dist/cotton-filter.exe
          prerelease: false

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --name cotton-filter --clean main.py
          ditto -c -k --sequesterRsrc --keepParent dist/cotton-filter.app dist/cotton-filter-macos.zip

      - name: Publish macOS release asset
        if: runner.os == 'macOS' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "cotton-filter latest"
          body: "Built automatically from commit ${{ github.sha }}."
          files: dist/cotton-filter-macos.zip
          prerelease: false
