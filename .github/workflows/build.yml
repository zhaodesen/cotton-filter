name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # 创建/更新 Release 需要

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl xlrd pyinstaller

      - name: Build single-file exe
        run: pyinstaller --onefile --name 棉花筛选 --clean cotton_filter.py

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "最新版本 (自动构建)"
          body: "由 commit ${{ github.sha }} 自动构建"
          files: dist/棉花筛选.exe
          prerelease: false
